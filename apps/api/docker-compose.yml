services:
  postgres:
    image: postgres:16-alpine
    container_name: crystal-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: crystal
      POSTGRES_PASSWORD: crystal
      POSTGRES_DB: crystal
    volumes:
      - crystal_pg_data:/var/lib/postgresql/data

volumes:
  crystal_pg_data:
